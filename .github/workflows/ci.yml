name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --quiet --eval 'db.runCommand({ping: 1})'"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: querylens
          POSTGRES_PASSWORD: querylens
          POSTGRES_DB: demo_hr
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U querylens"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      # Tests never call the API: the pipeline suite injects a fake LLM and the
      # dashboard run endpoint executes saved queries directly.
      ANTHROPIC_API_KEY: ci-dummy-key

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt ruff

      - name: Lint (ruff)
        run: ruff check .

      - name: Seed demo databases
        run: |
          python seed/seed_ecommerce.py --drop
          python seed/seed_hr.py

      - name: Pipeline tests (fake LLM, real MongoDB)
        run: python -m tests.test_pipeline

      - name: PostgreSQL connector tests (validator + live integration)
        run: python -m tests.test_postgres

      - name: Dashboard card tests (CRUD + LLM-free run)
        run: python -m tests.test_dashboard

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint (eslint)
        run: npm run lint

      - name: Production build
        run: npm run build
