services:
  mongodb:
    image: mongo:7
    ports:
      - "${MONGO_PORT:-27017}:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 12

  seed:
    build: ./backend
    profiles: ["seed"]
    command: python seed/seed_ecommerce.py --uri mongodb://mongodb:27017 --db demo_ecommerce --drop
    depends_on:
      mongodb:
        condition: service_healthy

  backend:
    build: ./backend
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    environment:
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      LLM_MODEL: ${LLM_MODEL:-claude-opus-4-8}
      APP_MONGODB_URI: mongodb://mongodb:27017
      DEMO_MONGODB_URI: mongodb://mongodb:27017
      DEMO_DATABASE: demo_ecommerce
    depends_on:
      mongodb:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=3)"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 15s

volumes:
  mongo_data:
