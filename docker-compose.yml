services:
  mongodb:
    image: mongo:7
    ports:
      - "${MONGO_PORT:-27017}:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 12

  postgres:
    image: postgres:16
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: querylens
      POSTGRES_PASSWORD: querylens
      POSTGRES_DB: demo_hr
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U querylens -d demo_hr"]
      interval: 5s
      timeout: 5s
      retries: 12

  seed:
    build: ./backend
    profiles: ["seed"]
    command: >
      sh -c "python seed/seed_ecommerce.py --uri mongodb://mongodb:27017 --db demo_ecommerce --drop
      && python seed/seed_hr.py --uri postgresql://querylens:querylens@postgres:5432 --db demo_hr --drop"
    depends_on:
      mongodb:
        condition: service_healthy
      postgres:
        condition: service_healthy

  backend:
    build: ./backend
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    environment:
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      LLM_MODEL: ${LLM_MODEL:-claude-opus-4-8}
      APP_MONGODB_URI: mongodb://mongodb:27017
      DEMO_MONGODB_URI: mongodb://mongodb:27017
      DEMO_DATABASE: demo_ecommerce
      DEMO_POSTGRES_URI: postgresql://querylens:querylens@postgres:5432
      DEMO_POSTGRES_DATABASE: demo_hr
    depends_on:
      mongodb:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=3)"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 15s

volumes:
  mongo_data:
  postgres_data:
